<div class="form-container">
  <h2>Registra Deposito</h2>
  
  <div class="form-group">
    <label>ID Conto</label>
    <input type="number" [(ngModel)]="accountId" placeholder="Inserisci ID conto" />
  </div>
  
  <div class="form-group">
    <label>Importo</label>
    <input type="number" step="0.01" [(ngModel)]="amount" placeholder="0.00" />
  </div>
  
  <div class="form-group">
    <label>Descrizione (opzionale)</label>
    <input type="text" [(ngModel)]="description" placeholder="Descrizione versamento" />
  </div>
  
  <button (click)="submit()" [disabled]="loading">Registra Deposito</button>

  <div *ngIf="loading" class="loading">Invio in corso...</div>
  <div *ngIf="message" class="success">{{message}}</div>
</div>
