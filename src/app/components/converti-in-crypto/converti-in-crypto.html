<div class="form-container">
  <h2>Converti in Criptovaluta</h2>

  <div class="form-group">
    <label>ID Conto</label>
    <input type="number" [(ngModel)]="accountId" placeholder="Inserisci ID conto" />
  </div>
  
  <div class="form-group">
    <label>Criptovaluta Destinazione</label>
    <select [(ngModel)]="target">
      <option value="">-- Seleziona crypto --</option>
      <option *ngFor="let c of currencies" [value]="c">{{c}}</option>
    </select>
  </div>
  
  <button (click)="convert()" [disabled]="loading">Converti</button>

  <div *ngIf="loading" class="loading">Conversione in corso...</div>
  <div *ngIf="error" class="error">{{error}}</div>
  
  <div *ngIf="resultDisplay" class="conversion-result">
    <h3>Risultato Conversione</h3>
    <div class="conversion-output">
      <h4>{{resultDisplay}}</h4>
    </div>
  </div>
</div>
